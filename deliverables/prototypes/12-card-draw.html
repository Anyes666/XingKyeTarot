<!DOCTYPE html>
<!--
  星钥塔罗 · 抽牌动画
  设计系统：C 方案「星钥之书」+ B「月湖映心」月光氛围（牌面舞台）
  基准尺寸：390×844 (iPhone 14 / HarmonyOS 主流机型)
  原型构建师：筑原型（Zhu）

  ▸ 设计意图：陪伴式抽牌——让翻牌过程像一次安静的仪式，而非博彩开奖
  ▸ 展示状态：revealed 阶段（牌面已翻开，正面展示），牌面为月亮牌 XVIII
  ▸ 动画序列（原型以静态 revealed 态呈现，注释标注完整序列）：
    1. 牌背淡入 300ms → 2. 翻牌 600ms rotateY → 3. 正面停留 → 4. 金色粒子 → 5. 跳转结果页
  ▸ 铁律执行：
    1. 去博彩感：金色仅用于细线、星点、LoadingProgress，无金色渐变背景
    2. 去算命感：提示语"星澜正在解读你的心事..."而非"正在占卜"
    3. 陪伴式：等待过程温柔而非急迫
    4. 合规：本页为过渡页，不展示结果，无需免责声明（结果页有）
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>抽牌 · 星钥塔罗</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════
       C 方案 + B 月光氛围 设计令牌（与 04-card-result.html 完全一致）
       ═══════════════════════════════════════════════════════════════ */
    :root {
      --bg-base-C: #0A0D1A;
      --bg-card-C: #121836;
      --bg-floating-C: #181F40;
      --bg-hover-C: #1C2450;
      --text-primary-C: #EBE3CD;
      --text-secondary-C: #8B869B;
      --text-tertiary-C: #5C5870;
      --gold-gilt-C: #C5A050;
      --gold-gilt-soft-C: #E0CD95;
      --spine-line-C: #1D2342;
      --crisis-C: #C8826A;

      --moonlight-glow-page: radial-gradient(ellipse 300px 200px at 50% 8%, rgba(212,172,77,0.04) 0%, transparent 70%);

      /* 牌面舞台月光光晕（更集中） */
      --moonlight-glow-stage: radial-gradient(ellipse 220px 280px at 50% 45%, rgba(212,172,77,0.06) 0%, transparent 65%);

      --gilt-line-top: rgba(197,160,80,0.4);
      --spine-center-C: rgba(197,160,80,0.15);

      --font-sans: "HarmonyOS Sans", "Source Sans 3", "Inter", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-serif: "HarmonyOS Serif", "Source Serif 4", "Noto Serif SC", Georgia, serif;
      --font-mono: "HarmonyOS Sans Mono", "JetBrains Mono", "Consolas", monospace;

      --text-card-name-C: 32px;
      --text-title-C: 28px;
      --text-subtitle-C: 20px;
      --text-body-C: 15px;
      --text-lead-C: 20px;
      --text-caption-C: 13px;
      --text-disclaimer-C: 11px;

      --space-2xs: 4px;
      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 16px;
      --space-md-b: 20px;
      --space-lg: 24px;
      --space-xl: 32px;

      --radius-btn-C: 8px;
      --radius-card-C: 12px;
      --radius-sm-C: 8px;
      --radius-full: 9999px;

      --shadow-card-c: 0 2px 16px rgba(0,0,0,0.35);

      --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-in-out: cubic-bezier(0.4, 0, 0.6, 1);
      --ease-overshoot: cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    /* ═══ 全局重置 ═══ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 390px; height: 844px; overflow: hidden;
      font-family: var(--font-sans);
      background-color: var(--bg-base-C);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══ 主容器 ═══ */
    .page {
      position: relative;
      width: 390px; height: 844px;
      background-color: var(--bg-base-C);
      overflow: hidden;
      display: flex; flex-direction: column;
      animation: pageEnter 300ms var(--ease-out) both;
    }
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══ B 方案月光光晕（顶部 + 牌面舞台集中光晕） ═══ */
    .moonlight-top {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 200px;
      background: var(--moonlight-glow-page);
      animation: moonlightBreath 6s var(--ease-in-out) infinite;
      pointer-events: none; z-index: 0;
    }
    /* 牌面舞台月光 — 集中在牌面周围 */
    .moonlight-stage {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--moonlight-glow-stage);
      animation: moonlightBreath 6s var(--ease-in-out) infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes moonlightBreath {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1.0; }
    }

    /* ═══ 顶部导航栏 ═══ */
    .nav-bar {
      position: relative; z-index: 10;
      height: 56px;
      display: flex; align-items: center;
      padding: 8px var(--space-md) 0 var(--space-md);
      flex-shrink: 0;
    }
    .nav-back {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: none; padding: 0;
      flex-shrink: 0;
    }
    .nav-back svg { width: 20px; height: 20px; }
    .nav-spacer { flex: 1; }

    /* ═══ 标题区（layoutWeight 14） ═══ */
    .title-area {
      position: relative; z-index: 5;
      flex: 0 0 14%;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: var(--space-sm);
      animation: fadeIn 400ms var(--ease-out) 100ms both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .title-text {
      font-family: var(--font-serif);
      font-size: var(--text-subtitle-C);
      font-weight: 700;
      color: var(--text-primary-C);
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* ═══ 牌面舞台区（layoutWeight 60） ═══ */
    .card-stage {
      position: relative; z-index: 5;
      flex: 0 0 60%;
      display: flex; align-items: center; justify-content: center;
      perspective: 1000px;
    }

    /*
       ▸ 翻牌动画序列（revealed 静态态展示）：
       阶段1 fadeIn  300ms — 牌背淡入
       阶段2 flipping 600ms — rotateY 0→180°
       阶段3 revealed — 正面停留（本原型展示此态）
       阶段4 particles 400ms — 金色粒子（CSS 烫金小点淡入）
       阶段5 done — 跳转结果页
    */
    .card-frame {
      width: 140px; height: 220px;
      background-color: var(--bg-card-C);
      border: 1px solid var(--spine-line-C);
      border-radius: var(--radius-sm-C);
      box-shadow: var(--shadow-card-c), 0 0 30px rgba(197,160,80,0.08);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
      /* revealed 态：正面展示 */
      animation: cardRevealIn 600ms var(--ease-out) both;
    }
    @keyframes cardRevealIn {
      from { opacity: 0; transform: rotateY(90deg) scale(0.95); }
      to   { opacity: 1; transform: rotateY(0deg) scale(1); }
    }

    /* 牌面框顶部/底部烫金细线 */
    .card-frame-top-line {
      position: absolute; top: 10px; left: 20%;
      width: 60%; height: 1px;
      background-color: var(--gilt-line-top);
    }
    .card-frame-bottom-line {
      position: absolute; bottom: 10px; left: 20%;
      width: 60%; height: 1px;
      background-color: rgba(197,160,80,0.3);
    }

    /* 月亮牌 SVG 图案区 */
    .card-moon-art {
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: var(--space-sm);
    }

    /* 牌名 */
    .card-name-mini {
      font-family: var(--font-serif);
      font-size: 13px;
      font-weight: 600;
      color: var(--gold-gilt-soft-C);
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.4;
    }
    .card-roman {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary-C);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* 金色粒子（阶段4 标注，静态展示几个烫金小点） */
    .particles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background-color: var(--gold-gilt-soft-C);
      opacity: 0;
      animation: particleFloat 1.5s var(--ease-out) 0.8s infinite;
    }
    .particle:nth-child(1) { top: 30%; left: 15%; animation-delay: 0.8s; }
    .particle:nth-child(2) { top: 20%; left: 75%; animation-delay: 1.0s; }
    .particle:nth-child(3) { top: 70%; left: 20%; animation-delay: 1.2s; }
    .particle:nth-child(4) { top: 60%; left: 80%; animation-delay: 0.9s; }
    .particle:nth-child(5) { top: 45%; left: 90%; animation-delay: 1.1s; }

    @keyframes particleFloat {
      0%   { opacity: 0; transform: scale(0.5); }
      50%  { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.5) translateY(-10px); }
    }

    /* ═══ 底部提示区 + LoadingProgress（layoutWeight 26） ═══ */
    .prompt-area {
      position: relative; z-index: 5;
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding-bottom: var(--space-xl);
      animation: fadeIn 400ms var(--ease-out) 300ms both;
    }
    .prompt-text {
      font-size: var(--text-body-C);
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-secondary-C);
      margin-bottom: var(--space-md);
      text-align: center;
    }

    /* LoadingProgress — CSS 烫金旋转圆环 */
    .loading-ring {
      width: 40px; height: 40px;
      border: 2px solid rgba(197,160,80,0.15);
      border-top-color: var(--gold-gilt-soft-C);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ═══ 降级 ═══ */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
      .moonlight-top, .moonlight-stage { opacity: 0.8; }
      .loading-ring { animation: spin 1.2s linear infinite; }
      .particle { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- B 方案月光光晕（顶部 + 牌面舞台集中光晕） -->
    <div class="moonlight-top"></div>
    <div class="moonlight-stage"></div>

    <!-- ═══ 顶部导航栏 ═══ -->
    <nav class="nav-bar">
      <button class="nav-back" type="button" aria-label="返回">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4 L6 10 L12 16" stroke="#EBE3CD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="nav-spacer"></div>
    </nav>

    <!-- ═══ 标题区 ═══ -->
    <div class="title-area">
      <p class="title-text">星澜正在为你抽一张牌</p>
    </div>

    <!-- ═══ 牌面舞台区 — revealed 状态（月亮牌 XVIII 正面展示） ═══ -->
    <div class="card-stage">
      <div class="card-frame">
        <div class="card-frame-top-line"></div>
        <div class="card-frame-bottom-line"></div>

        <!-- 月亮牌图案（SVG 内联） -->
        <div class="card-moon-art">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 月亮主体 -->
            <path d="M40 12 A20 20 0 1 0 40 52 A16 16 0 1 1 40 12 Z" fill="#C5A050" opacity="0.7"/>
            <!-- 月光射线 -->
            <line x1="32" y1="6" x2="32" y2="10" stroke="#E0CD95" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
            <line x1="22" y1="9" x2="24" y2="13" stroke="#E0CD95" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
            <line x1="14" y1="16" x2="18" y2="19" stroke="#E0CD95" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
            <!-- 下方星点 -->
            <circle cx="20" cy="44" r="1.2" fill="#C5A050" opacity="0.5"/>
            <circle cx="28" cy="50" r="0.8" fill="#C5A050" opacity="0.4"/>
            <circle cx="14" cy="38" r="0.8" fill="#C5A050" opacity="0.3"/>
          </svg>
        </div>

        <!-- 牌名 -->
        <div class="card-name-mini">月亮</div>
        <div class="card-roman">XVIII</div>

        <!-- 金色粒子（阶段4 标注） -->
        <div class="particles">
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
        </div>
      </div>
    </div>

    <!-- ═══ 底部提示区 + LoadingProgress ═══ -->
    <div class="prompt-area">
      <p class="prompt-text">星澜正在解读你的心事...</p>
      <div class="loading-ring"></div>
    </div>

  </div>
</body>
</html>
