<svg viewBox="0 0 680 812" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','HarmonyOS Sans','SF Pro',sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F0F23"/>
      <stop offset="50%" stop-color="#10172F"/>
      <stop offset="100%" stop-color="#0F0F23"/>
    </linearGradient>
    <linearGradient id="goldBtn2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D77A"/>
      <stop offset="55%" stop-color="#E5A50A"/>
      <stop offset="100%" stop-color="#D99A00"/>
    </linearGradient>
    <linearGradient id="selectedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5A50A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D99A00" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="topMask2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F0F23" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F0F23" stop-opacity="0"/>
    </linearGradient>
    <filter id="goldGlow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#D99A00" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════ 设计稿主体 0-375 ═══════ -->
  <rect x="0" y="0" width="375" height="812" fill="url(#bgGrad2)"/>

  <!-- 星点 -->
  <g fill="#F8FAFC">
    <circle cx="40" cy="120" r="0.8" opacity="0.5"/>
    <circle cx="335" cy="90" r="1" opacity="0.6"/>
    <circle cx="60" cy="200" r="0.7" opacity="0.4"/>
    <circle cx="320" cy="260" r="0.9" opacity="0.55"/>
    <circle cx="30" cy="380" r="0.8" opacity="0.5"/>
    <circle cx="350" cy="420" r="0.7" opacity="0.45"/>
    <circle cx="50" cy="540" r="1" opacity="0.6"/>
    <circle cx="330" cy="600" r="0.8" opacity="0.5"/>
  </g>

  <!-- 顶部渐隐 -->
  <rect x="0" y="0" width="375" height="100" fill="url(#topMask2)" opacity="0.6"/>

  <!-- 状态栏 -->
  <text x="30" y="28" fill="#F8FAFC" font-size="14" font-weight="600">9:41</text>
  <g fill="#F8FAFC">
    <rect x="305" y="20" width="3" height="10" rx="0.5"/>
    <rect x="311" y="18" width="3" height="12" rx="0.5"/>
    <rect x="317" y="16" width="3" height="14" rx="0.5"/>
    <rect x="323" y="14" width="3" height="16" rx="0.5"/>
    <rect x="333" y="18" width="22" height="10" rx="2" stroke="#F8FAFC" stroke-width="0.8" fill="none"/>
    <rect x="335" y="20" width="16" height="6" rx="1"/>
  </g>

  <!-- ═════ 返回按钮 ═════ -->
  <g transform="translate(24, 64)">
    <circle cx="0" cy="0" r="18" fill="#1B1B30" fill-opacity="0.6"/>
    <path d="M -4 0 L 0 -4 L 0 -1 L 4 -1 L 4 1 L 0 1 L 0 4 Z" fill="#F8FAFC" transform="rotate(-45)"/>
    <text x="26" y="3" fill="#94A3B8" font-size="13">返回</text>
  </g>

  <!-- ═════ 标题区 (110-200) ═════ -->
  <text x="187" y="140" text-anchor="middle" fill="#F8FAFC" font-size="24" font-weight="700" letter-spacing="1">你现在，最想被哪件事接住？</text>
  <text x="187" y="172" text-anchor="middle" fill="#94A3B8" font-size="13" letter-spacing="0.5">不用想太久，选最像你此刻的那一句</text>

  <!-- 装饰：标题下短金线 -->
  <line x1="167" y1="188" x2="207" y2="188" stroke="#E5A50A" stroke-width="1" opacity="0.7"/>

  <!-- ═════ 情绪选项区 (210-680) ═════ -->
  <!-- 选项采用 2 列网格，3 行 -->

  <!-- Row 1 -->
  <!-- 选项1: 关系内耗（选中态） -->
  <g transform="translate(24, 210)">
    <rect x="0" y="0" width="159" height="130" rx="16" fill="url(#selectedGrad)" stroke="#E5A50A" stroke-width="1.5"/>
    <circle cx="34" cy="36" r="16" fill="#E5A50A" fill-opacity="0.2"/>
    <!-- 心碎图标 -->
    <path d="M 27 30 Q 24 27 24 33 Q 24 38 30 42 Q 36 38 36 33 Q 36 27 33 30 L 30 33 Z" fill="#E5A50A"/>
    <text x="56" y="30" fill="#F8FAFC" font-size="15" font-weight="600">关系内耗</text>
    <text x="56" y="46" fill="#E5A50A" font-size="9" font-weight="600">SELECTED</text>
    <text x="14" y="78" fill="#94A3B8" font-size="11">对方一句话，让我反复</text>
    <text x="14" y="94" fill="#94A3B8" font-size="11">纠结到深夜。</text>
    <text x="14" y="114" fill="#6B6380" font-size="9">关系 · 反刍</text>
    <!-- 选中标记 -->
    <circle cx="143" cy="16" r="8" fill="#E5A50A"/>
    <path d="M 139 16 L 142 19 L 147 14" stroke="#0F0F23" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 选项2: 关系评估 -->
  <g transform="translate(192, 210)">
    <rect x="0" y="0" width="159" height="130" rx="16" fill="#1B1B30" fill-opacity="0.5"/>
    <circle cx="34" cy="36" r="16" fill="#5ED7D2" fill-opacity="0.12"/>
    <!-- 天平图标 -->
    <g stroke="#5ED7D2" stroke-width="1.2" fill="none">
      <line x1="30" y1="28" x2="30" y2="44"/>
      <line x1="24" y1="44" x2="36" y2="44"/>
      <path d="M 24 36 Q 24 40 27 40 Q 30 40 30 36"/>
      <path d="M 30 36 Q 30 40 33 40 Q 36 40 36 36"/>
    </g>
    <text x="56" y="30" fill="#F8FAFC" font-size="15" font-weight="600">关系评估</text>
    <text x="56" y="46" fill="#6B6380" font-size="9">犹豫中</text>
    <text x="14" y="78" fill="#94A3B8" font-size="11">这段关系，还值不值得</text>
    <text x="14" y="94" fill="#94A3B8" font-size="11">继续走下去？</text>
    <text x="14" y="114" fill="#6B6380" font-size="9">关系 · 决断</text>
  </g>

  <!-- Row 2 -->
  <!-- 选项3: 职场疲惫 -->
  <g transform="translate(24, 355)">
    <rect x="0" y="0" width="159" height="130" rx="16" fill="#1B1B30" fill-opacity="0.5"/>
    <circle cx="34" cy="36" r="16" fill="#8B7EC8" fill-opacity="0.15"/>
    <!-- 公文包图标 -->
    <g stroke="#8B7EC8" stroke-width="1.2" fill="none">
      <rect x="26" y="32" width="16" height="12" rx="1.5"/>
      <path d="M 30 32 L 30 29 L 38 29 L 38 32"/>
      <line x1="26" y1="37" x2="42" y2="37"/>
    </g>
    <text x="56" y="30" fill="#F8FAFC" font-size="15" font-weight="600">职场疲惫</text>
    <text x="56" y="46" fill="#6B6380" font-size="9">高压中</text>
    <text x="14" y="78" fill="#94A3B8" font-size="11">会议、KPI、人际消耗，</text>
    <text x="14" y="94" fill="#94A3B8" font-size="11">今天想躺平一会儿。</text>
    <text x="14" y="114" fill="#6B6380" font-size="9">职场 · 枯竭</text>
  </g>

  <!-- 选项4: 选择纠结 -->
  <g transform="translate(192, 355)">
    <rect x="0" y="0" width="159" height="130" rx="16" fill="#1B1B30" fill-opacity="0.5"/>
    <circle cx="34" cy="36" r="16" fill="#E5A50A" fill-opacity="0.12"/>
    <!-- 分叉路径图标 -->
    <g stroke="#E5A50A" stroke-width="1.3" fill="none" stroke-linecap="round">
      <path d="M 34 28 L 34 34"/>
      <path d="M 34 34 L 28 42"/>
      <path d="M 34 34 L 40 42"/>
      <circle cx="28" cy="44" r="1.5" fill="#E5A50A"/>
      <circle cx="40" cy="44" r="1.5" fill="#E5A50A"/>
    </g>
    <text x="56" y="30" fill="#F8FAFC" font-size="15" font-weight="600">选择纠结</text>
    <text x="56" y="46" fill="#6B6380" font-size="9">两难中</text>
    <text x="14" y="78" fill="#94A3B8" font-size="11">两个方向都想选，</text>
    <text x="14" y="94" fill="#94A3B8" font-size="11">又都怕错过。</text>
    <text x="14" y="114" fill="#6B6380" font-size="9">决策 · 摇摆</text>
  </g>

  <!-- Row 3 -->
  <!-- 选项5: 能量低落 -->
  <g transform="translate(24, 500)">
    <rect x="0" y="0" width="159" height="130" rx="16" fill="#1B1B30" fill-opacity="0.5"/>
    <circle cx="34" cy="36" r="16" fill="#5ED7D2" fill-opacity="0.12"/>
    <!-- 下半月图标 -->
    <g stroke="#5ED7D2" stroke-width="1.2" fill="none">
      <circle cx="34" cy="36" r="7"/>
      <path d="M 30 32 A 7 7 0 0 1 38 32 A 5 5 0 0 0 30 32 Z" fill="#5ED7D2" fill-opacity="0.6"/>
    </g>
    <text x="56" y="30" fill="#F8FAFC" font-size="15" font-weight="600">能量低落</text>
    <text x="56" y="46" fill="#6B6380" font-size="9">没电了</text>
    <text x="14" y="78" fill="#94A3B8" font-size="11">今天没什么力气，</text>
    <text x="14" y="94" fill="#94A3B8" font-size="11">连解释都嫌累。</text>
    <text x="14" y="114" fill="#6B6380" font-size="9">能量 · 耗尽</text>
  </g>

  <!-- 选项6: 寻求安慰 -->
  <g transform="translate(192, 500)">
    <rect x="0" y="0" width="159" height="130" rx="16" fill="#1B1B30" fill-opacity="0.5"/>
    <circle cx="34" cy="36" r="16" fill="#F5D77A" fill-opacity="0.18"/>
    <!-- 月亮图标 -->
    <g stroke="#F5D77A" stroke-width="1.2" fill="none">
      <path d="M 38 30 A 8 8 0 1 0 38 42 A 6 6 0 0 1 38 30 Z" fill="#F5D77A" fill-opacity="0.5"/>
    </g>
    <text x="56" y="30" fill="#F8FAFC" font-size="15" font-weight="600">寻求安慰</text>
    <text x="56" y="46" fill="#6B6380" font-size="9">需要抱抱</text>
    <text x="14" y="78" fill="#94A3B8" font-size="11">说不上具体怎么了，</text>
    <text x="14" y="94" fill="#94A3B8" font-size="11">就想被温柔接住一下。</text>
    <text x="14" y="114" fill="#6B6380" font-size="9">情绪 · 脆弱</text>
  </g>

  <!-- ═════ 底部 CTA 区 (660-770) ═════ -->
  <text x="187" y="680" text-anchor="middle" fill="#94A3B8" font-size="11">星澜会按你选的，抽一张贴合此刻的牌</text>

  <!-- 主 CTA -->
  <rect x="45" y="695" width="285" height="54" rx="27" fill="url(#goldBtn2)" filter="url(#goldGlow2)"/>
  <text x="187" y="728" text-anchor="middle" fill="#0F0F23" font-size="17" font-weight="700" letter-spacing="2">让星澜为我抽一张</text>

  <!-- 免责声明 -->
  <text x="187" y="768" text-anchor="middle" fill="#6B6380" font-size="10">结果仅供娱乐与自我探索参考，不构成任何专业建议</text>

  <!-- 手机外框 -->
  <rect x="0" y="0" width="375" height="812" fill="none" stroke="#2A2A4A" stroke-width="0.5"/>

  <!-- ═══════ 标注区 395-680 ═══════ -->
  <g font-family="'SF Pro','Inter',sans-serif">
    <text x="395" y="40" fill="#E5A50A" font-size="18" font-weight="700">星钥塔罗 · 选牌入口</text>
    <text x="395" y="62" fill="#94A3B8" font-size="11">AskHeartPage · 情绪分类</text>
    <line x1="395" y1="76" x2="670" y2="76" stroke="#2A2A4A" stroke-width="0.5"/>

    <!-- 尺寸标注 -->
    <g>
      <line x1="378" y1="56" x2="378" y2="110" stroke="#5ED7D2" stroke-width="0.6"/>
      <text x="388" y="86" fill="#5ED7D2" font-size="9">安全区+返回</text>
    </g>
    <g>
      <line x1="378" y1="110" x2="378" y2="200" stroke="#5ED7D2" stroke-width="0.6"/>
      <text x="388" y="156" fill="#5ED7D2" font-size="9">标题区 90</text>
    </g>
    <g>
      <line x1="378" y1="200" x2="378" y2="640" stroke="#5ED7D2" stroke-width="0.6"/>
      <text x="388" y="420" fill="#5ED7D2" font-size="9">情绪网格 440</text>
      <text x="388" y="433" fill="#6B6380" font-size="8">2 列 × 3 行</text>
      <text x="388" y="446" fill="#6B6380" font-size="8">gap 15</text>
    </g>
    <g>
      <line x1="378" y1="640" x2="378" y2="812" stroke="#5ED7D2" stroke-width="0.6"/>
      <text x="388" y="730" fill="#5ED7D2" font-size="9">CTA 区 172</text>
    </g>

    <!-- 设计要点 -->
    <g transform="translate(395, 130)">
      <text x="0" y="0" fill="#F8FAFC" font-size="11" font-weight="700">◆ 视觉升级要点</text>

      <text x="0" y="22" fill="#E5A50A" font-size="9" font-weight="600">① 情绪卡片网格</text>
      <text x="0" y="35" fill="#B8B0C8" font-size="9">2 列 × 3 行，单卡 159×130</text>
      <text x="0" y="47" fill="#B8B0C8" font-size="9">radius 16 / gap 15</text>
      <text x="0" y="59" fill="#B8B0C8" font-size="9">默认: 半透卡片 #1B1B30 50%</text>
      <text x="0" y="71" fill="#6B6380" font-size="8">→ backdropBlur(10) 毛玻璃</text>

      <text x="0" y="96" fill="#E5A50A" font-size="9" font-weight="600">② 选中态强化</text>
      <text x="0" y="109" fill="#B8B0C8" font-size="9">金色边框 #E5A50A 1.5px</text>
      <text x="0" y="121" fill="#B8B0C8" font-size="9">+ 金色渐变填充 18%</text>
      <text x="0" y="133" fill="#B8B0C8" font-size="9">右上角勾选圆点</text>
      <text x="0" y="145" fill="#B8B0C8" font-size="9">"SELECTED" 标签</text>

      <text x="0" y="170" fill="#E5A50A" font-size="9" font-weight="600">③ 情绪色彩编码</text>
      <text x="0" y="183" fill="#B8B0C8" font-size="9">关系内耗 → 金色 #E5A50A</text>
      <text x="0" y="195" fill="#B8B0C8" font-size="9">关系评估 → 极光 #5ED7D2</text>
      <text x="0" y="207" fill="#B8B0C8" font-size="9">职场疲惫 → 紫罗兰 #8B7EC8</text>
      <text x="0" y="219" fill="#B8B0C8" font-size="9">选择纠结 → 金色 #E5A50A</text>
      <text x="0" y="231" fill="#B8B0C8" font-size="9">能量低落 → 极光 #5ED7D2</text>
      <text x="0" y="243" fill="#B8B0C8" font-size="9">寻求安慰 → 浅金 #F5D77A</text>
      <text x="0" y="255" fill="#6B6380" font-size="8">→ 每种情绪一个色调</text>

      <text x="0" y="280" fill="#E5A50A" font-size="9" font-weight="600">④ 图标系统</text>
      <text x="0" y="293" fill="#B8B0C8" font-size="9">每选项一个语义图标</text>
      <text x="0" y="305" fill="#B8B0C8" font-size="9">统一线性风格 1.2px</text>
      <text x="0" y="317" fill="#6B6380" font-size="8">→ 心碎/天平/公文包/分叉/下弦月/满月</text>

      <text x="0" y="342" fill="#E5A50A" font-size="9" font-weight="600">⑤ 文案层级</text>
      <text x="0" y="355" fill="#B8B0C8" font-size="9">主标 15 / Bold / 月白</text>
      <text x="0" y="367" fill="#B8B0C8" font-size="9">副标 9 / 情绪色 / 状态标签</text>
      <text x="0" y="379" fill="#B8B0C8" font-size="9">描述 11 / 月白灰</text>
      <text x="0" y="391" fill="#B8B0C8" font-size="9">标签 9 / 深灰 "维度 · 状态"</text>

      <text x="0" y="416" fill="#E5A50A" font-size="9" font-weight="600">⑥ 交互规格</text>
      <text x="0" y="429" fill="#B8B0C8" font-size="9">点击 → 选中态切换</text>
      <text x="0" y="441" fill="#B8B0C8" font-size="9">再点同卡 → 取消选中</text>
      <text x="0" y="453" fill="#B8B0C8" font-size="9">未选时 CTA 灰阶禁用</text>
      <text x="0" y="465" fill="#6B6380" font-size="8">→ scale 0.97 pressed</text>
      <text x="0" y="477" fill="#6B6380" font-size="8">→ 200ms EaseInOut 过渡</text>
    </g>
  </g>
</svg>
