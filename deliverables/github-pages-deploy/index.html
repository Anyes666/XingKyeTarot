<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星钥塔罗 · 协议中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #080B18 0%, #10172F 50%, #080B18 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #F8F3E7;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area h1 {
      font-size: 32px;
      letter-spacing: 4px;
      color: #D8B45A;
      margin-bottom: 8px;
    }
    .logo-area .subtitle {
      font-size: 14px;
      color: #9B91B5;
      letter-spacing: 2px;
    }
    .logo-area .meta {
      font-size: 12px;
      color: #6B6380;
      margin-top: 8px;
      letter-spacing: 1px;
    }
    .card {
      background: #171D3A;
      border-radius: 12px;
      padding: 32px 24px;
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(216, 180, 90, 0.15);
    }
    .card a {
      display: block;
      padding: 16px 20px;
      margin-bottom: 12px;
      border: 1px solid rgba(216, 180, 90, 0.3);
      border-radius: 8px;
      color: #F8F3E7;
      text-decoration: none;
      font-size: 15px;
      transition: all 0.2s;
      text-align: center;
    }
    .card a .desc {
      display: block;
      font-size: 12px;
      color: #9B91B5;
      margin-top: 4px;
      font-weight: 400;
    }
    .card a:hover {
      border-color: #D8B45A;
      background: rgba(216, 180, 90, 0.1);
      color: #D8B45A;
    }
    .card a:hover .desc {
      color: #D8B45A;
    }
    .card a:last-child { margin-bottom: 0; }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #6B6380;
      text-align: center;
      line-height: 1.8;
    }
    @media (max-width: 480px) {
      .logo-area h1 { font-size: 24px; }
      .card { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div class="logo-area">
    <h1>星钥塔罗</h1>
    <p class="subtitle">协议中心</p>
    <p class="meta">v1.0.0 · 生效日期 2026年6月26日</p>
  </div>
  <div class="card">
    <a href="user-agreement.html">
      用户协议
      <span class="desc">查看《星钥塔罗用户协议》全文</span>
    </a>
    <a href="privacy-policy.html">
      隐私政策
      <span class="desc">查看《星钥塔罗隐私政策》全文</span>
    </a>
  </div>
  <div class="footer">
    &copy; 2026 星钥塔罗 &nbsp;·&nbsp; com.xingkey.tarot<br>
    开发者：杨鹏宇
  </div>
</body>
</html>
